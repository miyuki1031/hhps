debug: true
# ここから追加だにょ！
logging:
    level:
        "[org.hibernate.SQL]": DEBUG
        "[org.hibernate.type.descriptor.sql.BasicBinder]": TRACE
        "[org.hibernate.tool.schema]": DEBUG # これが型エラーを詳しく教えてくれるにょ！

spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/mylocaldb?currentSchema=public&reWriteBatchedInserts=true
        username: myuser
        password: mypassword

    jpa:
        show-sql: true
        # 👇 ここ！ jpa のすぐ下に hibernate と並んで書くにょ
        hibernate:
            ddl-auto: validate
        properties:
            # hibernate 階層を作らず、直接プロパティ名として指定するにょ！
            "[hibernate.physical_naming_strategy]": org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
            "[hibernate.implicit_naming_strategy]": org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
            "[hibernate.format_sql]": true
            "[hibernate.use_sql_comments]": true
            "[hibernate.dialect]": org.hibernate.dialect.PostgreSQLDialect
